name: housing_widgetbook
description: "Widgetbook catalog for the Housing Design System."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  widgetbook: ^3.23.0
  widgetbook_annotation: ^3.11.0

  # The design system under test, consumed via a local path dependency.
  housing_design_system:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  widgetbook_generator: ^3.24.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
